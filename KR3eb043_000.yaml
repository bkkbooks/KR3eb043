front:
  text: 自序脈雖四診之一其精微玄妙非粗工庸術所能推測晉王叔和之言曰心中易了指下難明謂沉為伏方治永乖以緩作遲危殆立至況有數候俱見異病同脈者乎若是乎辨之不易也豫何人斯敢為脈辨然理雖難辨自上古神聖以及歷代名宿雖兼望聞問未有舍切而能施其巧者豫又不得不為之辨辨之云者亦非敢於古人未發之旨妄增一說也古人之言簡質平意淡多含蓄未易通曉豫則辨之使顯俾隱深之妙洞若觀火及至後儒各殫所學博求衆本人持一說莫所適從豫則辨之使其據經分剖不致混亂一辨大略也自二辨至七辨宗伯仁之六脈而著其所統共得二十九脈每脈各注其陰陽肖其形象如芤動牢革之最難明者皆有確義可尋自八辨至十二辨則詳敘十二經源流不特盡脈所經行之處與診脈之法如辨肺經則肺之體肺之用肺之性情肺所受六淫七情之傷以及肺之積肺之敗不獨知肺之脈兼盡肺之義心脾肝腎莫不皆然而於胞絡三焦向所憒憒者尤極開晰自十四辨至三十二辨則究極脈中變化之奧有全取諸書者則標其目雖粗工庸術閲是編當亦有會然不敢自謂無漏也聊以此請正天下有知豫蓋留心於此道者或肯惠然賜教耳祝序管侗人先生不知何許人此書為其手著言簡意賅瞭如指掌洵有裨初學之書也豫於今春得於吳市之舊書肆中雖為抄本而簡端有新刊二字似當時已付梓行大約流傳未廣寖致湮沒惜哉爰將原本郵寄吉生仁丈即煩校正付印以公同好云癸亥鞠秋下浣海昌後學祝紹鈞識於吳門客次
